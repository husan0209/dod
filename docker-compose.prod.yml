# docker-compose.prod.yml

version: '3.9'

services:

  # ── PostgreSQL ──────────────────
  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/backups:/backups
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G

  # ── Redis ───────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Django (Gunicorn) ───────────
  web:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    restart: always
    command: >
      gunicorn config.wsgi:application
      --bind 0.0.0.0:8000
      --workers ${GUNICORN_WORKERS:-4}
      --threads 2
      --timeout 120
      --max-requests 1000
      --max-requests-jitter 100
      --access-logfile -
      --error-logfile -
      --log-level info
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G

  # ── Daphne (WebSocket/ASGI) ────
  channels:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    restart: always
    command: >
      daphne config.asgi:application
      --bind 0.0.0.0
      --port 8001
      --verbosity 1
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Celery Worker ───────────────
  celery_worker:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    restart: always
    command: >
      celery -A config worker
      --loglevel=info
      --concurrency=${CELERY_CONCURRENCY:-4}
      --max-tasks-per-child=1000
      -Q default,notifications,payments,analytics
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G

  # ── Celery Beat ─────────────────
  celery_beat:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    restart: always
    command: >
      celery -A config beat
      --loglevel=info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Nginx ───────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d
      - ./deploy/nginx/snippets:/etc/nginx/snippets
      - ./deploy/nginx/ssl:/etc/nginx/ssl
      - static_volume:/var/www/static
      - media_volume:/var/www/media
      - certbot_www:/var/www/certbot
    depends_on:
      - web
      - channels

  # ── Certbot (SSL) ───────────────
  certbot:
    image: certbot/certbot
    volumes:
      - ./deploy/nginx/ssl:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot
        --webroot-path=/var/www/certbot;
        sleep 12h;
      done"

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  certbot_www:
