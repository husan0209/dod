version: '3.9'

services:
  app:
    build: .
    container_name: dod_app
    command: daphne -b 0.0.0.0 -p 9000 config.asgi:application
    volumes:
      - ./:/app
    ports:
      - "9000:9000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - celery

  celery:
    build: .
    container_name: dod_celery
    command: celery -A config worker -l info
    volumes:
      - ./:/app
    env_file:
      - .env
    depends_on:
      - redis

  db:
    image: postgres:16-alpine
    container_name: dod_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-dod}
      POSTGRES_USER: ${DB_USER:-dod_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dod_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: dod_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]

volumes:
  pgdata:
