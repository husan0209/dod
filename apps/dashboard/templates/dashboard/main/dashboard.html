{% extends 'dashboard/base.html' %}

{% block title %}Dashboard | DOD Admin{% endblock %}
{% block page_title %}Дашборд DOD{% endblock %}

{% block content %}
<div id="stats-container" hx-get="{% url 'dashboard:stats' %}" hx-trigger="load, every 30s"
    hx-target="#stats-container">
    <!-- Premium Loading State -->
    <div class="flex flex-col items-center justify-center py-20 animate-pulse">
        <div class="w-12 h-12 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mb-4"></div>
        <p class="text-xs text-text-muted font-bold uppercase tracking-widest">Агрегация данных...</p>
    </div>
</div>

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% endblock %}
{% endblock %}
