{% extends 'dashboard/base.html' %}

{% block title %}Predictions Overview | DOD Admin{% endblock %}
{% block page_title %}DOD Predictions{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="glass-card p-12 text-center max-w-2xl mx-auto">
        <div class="w-20 h-20 bg-blue-500/10 text-blue-400 rounded-3xl flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z">
                </path>
            </svg>
        </div>
        <h2 class="text-2xl font-bold text-white font-outfit mb-2">Predictions Module</h2>
        <p class="text-xs text-text-muted uppercase tracking-widest font-bold mb-8">Модуль находится в разработке</p>

        <div class="grid grid-cols-2 gap-4">
            <div class="p-4 bg-white/5 rounded-2xl border border-white/5">
                <div class="text-lg font-bold text-white font-outfit">$0.00</div>
                <div class="text-[9px] font-bold text-text-muted uppercase tracking-widest">Профит модуля</div>
            </div>
            <div class="p-4 bg-white/5 rounded-2xl border border-white/5">
                <div class="text-lg font-bold text-white font-outfit">0</div>
                <div class="text-[9px] font-bold text-text-muted uppercase tracking-widest">Активные юзеры</div>
            </div>
        </div>

        <button class="mt-8 btn-premium px-8 py-3 text-xs opacity-50 cursor-not-allowed">🛠️ Перейти в
            конфигуратор</button>
    </div>
</div>
{% endblock %}
