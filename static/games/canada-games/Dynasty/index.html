<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynasty - Casino Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        
        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 1280px;
            max-height: 720px;
        }
        
        #gameCanvas {
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            border: none;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            font-size: 18px;
        }
        
        .loading::after {
            content: '';
            display: block;
            width: 40px;
            height: 40px;
            margin: 20px auto;
            border: 4px solid #333;
            border-top: 4px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div class="loading" id="loading">Loading Dynasty...</div>
        <canvas id="game"></canvas>
    </div>

    <!-- Game Scripts -->
    <script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>
    <script src="js/core.js"></script>
    <script src="js/loader.js"></script>
    <script src="js/utils.js"></script>
    
    <script>
        // Initialize game when page loads
        window.addEventListener('load', function() {
            const loading = document.getElementById('loading');
            const canvas = document.getElementById('game');
            
            try {
                // Initialize game based on Canada Games structure
                if (typeof InitializeGame === 'function') {
                    InitializeGame();
                    loading.style.display = 'none';
                } else if (window.GameCore) {
                    window.GameCore.init({
                        canvas: canvas,
                        gamePath: './',
                        onGameReady: function() {
                            loading.style.display = 'none';
                        },
                        onError: function(error) {
                            loading.innerHTML = 'Error loading game. Please refresh.';
                            console.error('Game initialization error:', error);
                        }
                    });
                } else {
                    // Fallback for games without GameCore or InitializeGame
                    setTimeout(() => {
                        loading.style.display = 'none';
                        canvas.style.background = 'url("./GAME.png") center/contain no-repeat';
                    }, 2000);
                }
            } catch (error) {
                console.error('Game load error:', error);
                loading.innerHTML = 'Error loading game. Please refresh.';
            }
        });
        
        // Handle window resize
        window.addEventListener('resize', function() {
            if (window.game && window.game.resize) {
                window.game.resize();
            }
        });
    </script>
</body>
</html>
