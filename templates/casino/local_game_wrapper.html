{% extends 'base.html' %}
{% load static %}

{% block title %}{{ game.name }} - DOD Casino{% endblock %}

{% block extra_css %}
<style>
    .game-wrapper {
        width: 100%;
        height: 80vh; /* Adjust height based on layout */
        min-height: 600px;
        background-color: #000;
        border-radius: 12px;
        overflow: hidden;
        position: relative;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
    
    .game-iframe {
        width: 100%;
        height: 100%;
        border: none;
    }
    
    .game-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }
    
    .game-title {
        font-size: 24px;
        font-weight: bold;
        color: #fff;
        margin: 0;
    }
    
    .back-btn {
        background-color: #333;
        color: #fff;
        border: none;
        padding: 8px 16px;
        border-radius: 8px;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: background-color 0.2s;
    }
    
    .back-btn:hover {
        background-color: #444;
        color: #fff;
    }
    
    .game-info-badge {
        background-color: rgba(255, 255, 255, 0.1);
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 14px;
        color: #aaa;
        display: inline-block;
        margin-left: 10px;
    }
</style>
{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="game-header">
        <div class="d-flex align-items-center">
            <h1 class="game-title">{{ game.name }}</h1>
            <span class="game-info-badge">Demo Mode</span>
        </div>
        <a href="{% url 'casino:index' %}" class="back-btn">
            <i class="fas fa-arrow-left"></i> Назад в лобби
        </a>
    </div>

    <div class="game-wrapper">
        <iframe src="{{ game_url }}" 
                class="game-iframe" 
                allowfullscreen 
                scrolling="no"
                id="gameIframe">
        </iframe>
    </div>
</div>
{% endblock %}
