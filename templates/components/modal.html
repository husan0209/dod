{# Modal component - include with: {% include "components/modal.html" %} #}
<div x-show="showModal" x-cloak @click.outside="showModal = false" class="fixed inset-0 z-50 overflow-y-auto">
    <!-- Backdrop -->
    <div x-show="showModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm" x-transition></div>
    
    <!-- Modal Container -->
    <div class="flex items-center justify-center min-h-screen px-4 py-8">
        <div x-show="showModal" 
             @click.stop 
             class="card max-w-md w-full relative z-10" 
             x-transition>
            <!-- Modal Header -->
            <div class="flex items-center justify-between pb-4 border-b border-slate-800">
                <h3 class="text-lg font-bold text-white" x-text="modalTitle"></h3>
                <button @click="showModal = false" class="text-slate-500 hover:text-white">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            
            <!-- Modal Body -->
            <div class="py-4" x-html="modalContent"></div>
            
            <!-- Modal Footer -->
            <div class="flex gap-3 pt-4 border-t border-slate-800">
                <button @click="showModal = false" class="btn btn-secondary flex-1">Cancel</button>
                <button @click="modalAction()" class="btn btn-primary flex-1" x-text="modalActionText"></button>
            </div>
        </div>
    </div>
</div>
