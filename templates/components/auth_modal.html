<div x-show="authModalOpen" class="fixed inset-0 z-[100] flex items-center justify-center overflow-y-auto" style="display: none;"
     x-data="{
         isLoading: false,
         loginError: '',
         registerError: '',
         async submitLogin(e) {
             this.isLoading = true;
             this.loginError = '';
             let formData = new FormData(e.target);
             try {
                 let res = await fetch(e.target.action, {
                     method: 'POST',
                     body: formData,
                     headers: {
                         'X-Requested-With': 'XMLHttpRequest'
                     }
                 });
                 let data = await res.json();
                 if (data.success) {
                     window.location.href = data.redirect_url || '/';
                 } else {
                     this.loginError = data.error || 'Ошибка входа';
                 }
             } catch (err) {
                 this.loginError = 'Произошла ошибка сети';
             } finally {
                 this.isLoading = false;
             }
         },
         async submitRegister(e) {
             this.isLoading = true;
             this.registerError = '';
             let formData = new FormData(e.target);
             try {
                 let res = await fetch(e.target.action, {
                     method: 'POST',
                     body: formData,
                     headers: {
                         'X-Requested-With': 'XMLHttpRequest'
                     }
                 });
                 let data = await res.json();
                 if (data.success) {
                     window.location.href = data.redirect_url || '/';
                 } else {
                     this.registerError = data.error || 'Ошибка регистрации';
                 }
             } catch (err) {
                 this.registerError = 'Произошла ошибка сети';
             } finally {
                 this.isLoading = false;
             }
         }
     }">
    <!-- Backdrop -->
    <div class="fixed inset-0 bg-black/60 backdrop-blur-sm" @click="authModalOpen = false"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"></div>

    <!-- Modal Panel -->
    <div class="relative bg-[#1a1d23] border border-white/10 rounded-2xl w-full max-w-md mx-4 shadow-2xl p-6 sm:p-8"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 scale-95 translate-y-4"
         x-transition:enter-end="opacity-100 scale-100 translate-y-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 scale-100 translate-y-0"
         x-transition:leave-end="opacity-0 scale-95 translate-y-4">
        
        <!-- Close Button -->
        <button @click="authModalOpen = false" class="absolute top-4 right-4 text-text-secondary hover:text-white transition-colors bg-transparent border-0">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>

        <!-- Logo / Header -->
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl mb-3 shadow-lg">
                <span class="text-white font-bold text-2xl font-outfit">D</span>
            </div>
            <h2 class="text-2xl font-bold text-white font-outfit" x-text="authTab === 'login' ? 'Вход в аккаунт' : 'Создать аккаунт'"></h2>
            <p class="text-sm text-text-secondary mt-1" x-text="authTab === 'login' ? 'С возвращением!' : 'Присоединяйтесь к платформе нового поколения'"></p>
        </div>

        <!-- Tabs -->
        <div class="flex p-1 bg-black/20 rounded-xl mb-6 border border-white/5">
            <button @click="authTab = 'login'" class="flex-1 py-2 text-sm font-medium rounded-lg transition-all border-0 focus:outline-none"
                    :class="authTab === 'login' ? 'bg-[#2a2e37] text-white shadow shadow-black/50' : 'text-text-secondary hover:text-white hover:bg-white/5 bg-transparent'">
                Вход
            </button>
            <button @click="authTab = 'register'" class="flex-1 py-2 text-sm font-medium rounded-lg transition-all border-0 focus:outline-none"
                    :class="authTab === 'register' ? 'bg-[#2a2e37] text-white shadow shadow-black/50' : 'text-text-secondary hover:text-white hover:bg-white/5 bg-transparent'">
                Регистрация
            </button>
        </div>

        <!-- Login Form -->
        <div x-show="authTab === 'login'" x-transition.opacity.duration.300ms>
            <form action="{% url 'accounts:login' %}" method="post" @submit.prevent="submitLogin($event)" class="space-y-4">
                {% csrf_token %}

                <template x-if="loginError">
                    <div class="bg-red-500/10 border border-red-500/20 text-red-400 text-sm p-3 rounded-xl flex items-start space-x-2">
                        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <span x-text="loginError"></span>
                    </div>
                </template>

                <div>
                    <label class="block text-sm font-medium text-text-secondary mb-1">Email</label>
                    <div class="relative">
                        <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-text-muted w-5 h-5 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        <input type="email" name="username" class="w-full bg-[#12151c] border border-white/10 rounded-xl pl-10 pr-4 py-3 text-white placeholder-text-muted focus:outline-none focus:border-blue-500 hover:border-white/20 transition-colors" placeholder="your@email.com" required>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label class="text-sm font-medium text-text-secondary">Пароль</label>
                        <a href="{% url 'accounts:password_reset' %}" class="text-xs text-blue-400 hover:text-blue-300 font-medium transition-colors">Забыли пароль?</a>
                    </div>
                    <div class="relative">
                        <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-text-muted w-5 h-5 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        <input type="password" name="password" class="w-full bg-[#12151c] border border-white/10 rounded-xl pl-10 pr-4 py-3 text-white placeholder-text-muted focus:outline-none focus:border-blue-500 hover:border-white/20 transition-colors" placeholder="••••••••" required>
                    </div>
                </div>
                
                <div class="pt-2">
                    <button type="submit" :disabled="isLoading" class="w-full flex items-center justify-center space-x-2 bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-[0_0_20px_rgba(59,130,246,0.3)] hover:shadow-[0_0_25px_rgba(59,130,246,0.5)] transition-all transform hover:-translate-y-0.5 border-none disabled:opacity-50 disabled:cursor-not-allowed">
                        <svg x-show="isLoading" class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        <span x-text="isLoading ? 'Вход...' : 'Войти'"></span>
                    </button>
                </div>
            </form>
        </div>

        <!-- Register Form -->
        <div x-show="authTab === 'register'" style="display: none;" x-transition.opacity.duration.300ms>
            <form action="{% url 'accounts:register' %}" method="post" @submit.prevent="submitRegister($event)" class="space-y-4">
                {% csrf_token %}

                <template x-if="registerError">
                    <div class="bg-red-500/10 border border-red-500/20 text-red-400 text-sm p-3 rounded-xl flex items-start space-x-2">
                        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <span x-text="registerError"></span>
                    </div>
                </template>

                <div>
                    <label class="block text-sm font-medium text-text-secondary mb-1">Email</label>
                    <input type="email" name="email" class="w-full bg-[#12151c] border border-white/10 rounded-xl px-4 py-3 text-white placeholder-text-muted focus:outline-none focus:border-blue-500 hover:border-white/20 transition-colors" placeholder="your@email.com" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-text-secondary mb-1">Имя пользователя (Логин)</label>
                    <input type="text" name="username" class="w-full bg-[#12151c] border border-white/10 rounded-xl px-4 py-3 text-white placeholder-text-muted focus:outline-none focus:border-blue-500 hover:border-white/20 transition-colors" placeholder="john_doe" minlength="3" maxlength="30" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-text-secondary mb-1">Пароль</label>
                    <input type="password" name="password1" class="w-full bg-[#12151c] border border-white/10 rounded-xl px-4 py-3 text-white placeholder-text-muted focus:outline-none focus:border-blue-500 hover:border-white/20 transition-colors" placeholder="••••••••" minlength="8" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-text-secondary mb-1">Подтвердите пароль</label>
                    <input type="password" name="password2" class="w-full bg-[#12151c] border border-white/10 rounded-xl px-4 py-3 text-white placeholder-text-muted focus:outline-none focus:border-blue-500 hover:border-white/20 transition-colors" placeholder="••••••••" required>
                </div>

                <div class="pt-2">
                    <button type="submit" :disabled="isLoading" class="w-full flex items-center justify-center space-x-2 bg-gradient-to-r from-[#ccff00] to-[#99cc00] hover:from-[#d4ff33] hover:to-[#aae600] text-black font-bold py-3.5 rounded-xl shadow-[0_0_20px_rgba(204,255,0,0.3)] hover:shadow-[0_0_25px_rgba(204,255,0,0.5)] transition-all transform hover:-translate-y-0.5 border-none disabled:opacity-50 disabled:cursor-not-allowed">
                        <svg x-show="isLoading" class="animate-spin h-5 w-5 text-black" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        <span x-text="isLoading ? 'Регистрация...' : 'Зарегистрироваться'"></span>
                    </button>
                </div>
            </form>
        </div>
        
    </div>
</div>
