{# Card Component - include with: {% include "components/card.html" %} #}
<div class="card {% if class %}{{ class }}{% endif %}">
    {% if title or subtitle %}
        <div class="pb-6 border-b border-slate-800 mb-6">
            {% if title %}
                <h3 class="text-lg font-bold text-white">{{ title }}</h3>
            {% endif %}
            {% if subtitle %}
                <p class="text-sm text-slate-400 mt-1">{{ subtitle }}</p>
            {% endif %}
        </div>
    {% endif %}
    
    {% if content %}
        {{ content|safe }}
    {% else %}
        <slot></slot>
    {% endif %}
</div>
