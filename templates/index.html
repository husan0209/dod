{% extends "base.html" %}
{% load static %}

{% block content %}
<!-- Main page container for guests -->
<div class="flex flex-col items-center justify-center min-h-[calc(100vh-4rem)] text-center px-4 relative overflow-hidden" 
     x-init="!{{ user.is_authenticated|yesno:'true,false' }} ? authModalOpen = true : ''">
    
    <!-- Background Elements -->
    <div class="absolute inset-0 z-0">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-500/20 rounded-full mix-blend-screen filter blur-[100px] animate-pulse"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-500/20 rounded-full mix-blend-screen filter blur-[100px] animate-pulse" style="animation-delay: 2s;"></div>
    </div>

    <!-- Content -->
    <div class="relative z-10 w-full max-w-4xl mx-auto space-y-8">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl shadow-[0_0_30px_rgba(59,130,246,0.5)] transform -rotate-6 mb-4">
            <span class="text-white font-bold text-4xl font-outfit tracking-tighter">D</span>
        </div>
        
        <h1 class="text-5xl md:text-7xl font-bold font-outfit tracking-tight text-white mb-6">
            Добро пожаловать в <br/>
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-[#ccff00] animate-text-shine" style="background-size: 200% auto;">DOD Platform</span>
        </h1>
        
        <p class="text-xl text-text-secondary max-w-2xl mx-auto mb-10">
            Платформа нового поколения. Казино, ставки на спорт и рынки предсказаний в одном месте.
        </p>
        
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
            <button @click="authModalOpen = true; authTab = 'register'" class="w-full sm:w-auto px-8 py-4 bg-gradient-to-r from-[#ccff00] to-green-400 text-black font-bold rounded-xl shadow-[0_0_20px_rgba(204,255,0,0.3)] hover:shadow-[0_0_30px_rgba(204,255,0,0.5)] transition-all transform hover:-translate-y-1 text-lg">
                Начать играть
            </button>
            <button @click="authModalOpen = true; authTab = 'login'" class="w-full sm:w-auto px-8 py-4 bg-[#1a1d23] border border-white/10 text-white font-bold rounded-xl hover:bg-white/5 transition-all text-lg flex items-center justify-center space-x-2">
                <span>Войти в аккаунт</span>
            </button>
        </div>
    </div>
</div>
{% endblock %}
