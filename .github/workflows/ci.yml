# .github/workflows/ci.yml

name: CI Pipeline

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main]

jobs:

  # ── LINT ────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install flake8 black isort mypy

      - name: Flake8
        run: flake8 apps/ config/ --max-line-length=120

      - name: Black check
        run: black --check apps/ config/

      - name: isort check
        run: isort --check-only apps/ config/

  # ── TESTS ───────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dod_test
          POSTGRES_USER: dod_test
          POSTGRES_PASSWORD: test_password
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DB_NAME: dod_test
          DB_USER: dod_test
          DB_PASSWORD: test_password
          DB_HOST: localhost
          REDIS_HOST: localhost
          SECRET_KEY: test-secret-key
          DJANGO_SETTINGS_MODULE: config.settings.test
        run: |
          python manage.py test apps/ \
            --verbosity=2 \
            --parallel \
            --failfast

      - name: Coverage report
        env:
          DB_NAME: dod_test
          DB_USER: dod_test
          DB_PASSWORD: test_password
          DB_HOST: localhost
          REDIS_HOST: localhost
          SECRET_KEY: test-secret-key
          DJANGO_SETTINGS_MODULE: config.settings.test
        run: |
          pip install coverage
          coverage run manage.py test apps/ --parallel
          coverage report --fail-under=70
          coverage xml

  # ── SECURITY ────────────────────
  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Safety check
        run: |
          pip install safety
          safety check -r requirements.txt

      - name: Bandit (security linter)
        run: |
          pip install bandit
          bandit -r apps/ -ll

  # ── BUILD ───────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t dod-app:${{ github.sha }} \
            -f deploy/docker/Dockerfile .

      - name: Save image
        run: |
          docker save dod-app:${{ github.sha }} | gzip > image.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz
          retention-days: 3
