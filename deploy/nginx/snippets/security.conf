# deploy/nginx/snippets/security.conf

# Prevent MIME type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Enable XSS Protection
add_header X-XSS-Protection "1; mode=block" always;

# Clickjacking Protection
add_header X-Frame-Options "SAMEORIGIN" always;

# Referrer Policy
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions Policy
add_header Permissions-Policy "accelerometer=(), camera=(), microphone=(), geolocation=(), gyroscope=(), magnetometer=(), usb=(), vr=()" always;

# Content Security Policy
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' cdn.jsdelivr.net *.google-analytics.com *.googletagmanager.com; style-src 'self' 'unsafe-inline' cdn.jsdelivr.net fonts.googleapis.com; font-src 'self' fonts.gstatic.com cdn.jsdelivr.net; img-src 'self' data: https:; connect-src 'self' *.google-analytics.com *.googletagmanager.com wss:; frame-ancestors 'none'; base-uri 'self';" always;

# Feature Policy
add_header Feature-Policy "geolocation 'none'; microphone 'none'; camera 'none';" always;

# Remove Server Header
server_tokens off;
  always;
add_header Strict-Transport-Security
  "max-age=31536000; includeSubDomains; preload" always;
